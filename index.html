<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kofein Monitor</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .bg-brown-600 { background-color: #78350f; }
        .text-brown-600 { color: #78350f; }
        .bg-brown-50 { background-color: #fff7ed; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Ikonice (zamena za Lucide jer radimo u jednom fajlu)
        const CoffeeIcon = () => <span>☕</span>;
        const PlusIcon = () => <span>+</span>;

        const COFFEE_TYPES = [
            { id: 'espresso', name: 'Espresso', caffeinePerMl: 2.1, standardSize: 30 },
            { id: 'turska', name: 'Turska kafa', caffeinePerMl: 0.8, standardSize: 100 },
            { id: 'americano', name: 'Americano', caffeinePerMl: 0.5, standardSize: 200 },
            { id: 'cappuccino', name: 'Cappuccino', caffeinePerMl: 0.4, standardSize: 150 },
            { id: 'instant', name: 'Instant kafa', caffeinePerMl: 0.4, standardSize: 200 },
            { id: 'filter', name: 'Filter kafa', caffeinePerMl: 0.6, standardSize: 200 },
        ];

        function App() {
            const [logs, setLogs] = useState([]);
            const [showModal, setShowModal] = useState(false);
            const [selectedType, setSelectedType] = useState(COFFEE_TYPES[0]);
            const [amount, setAmount] = useState(30);

            const totalCaffeine = logs.reduce((sum, log) => sum + log.caffeine, 0);
            const limit = 400;

            const addLog = () => {
                const newLog = {
                    id: Date.now(),
                    name: selectedType.name,
                    caffeine: Math.round(selectedType.caffeinePerMl * amount),
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                };
                setLogs([newLog, ...logs]);
                setShowModal(false);
            };

            return (
                <div className="min-h-screen bg-gray-50 pb-20 font-sans">
                    <div className="bg-white p-6 pt-12 border-b">
                        <h1 className="text-3xl font-bold">Kofein Monitor</h1>
                    </div>

                    <div className="p-6">
                        <div className="bg-white p-6 rounded-3xl shadow-sm mb-6 border">
                            <div className="text-4xl font-bold">{totalCaffeine} <span className="text-gray-400 text-lg">/ {limit} mg</span></div>
                            <div className="w-full bg-gray-100 h-3 rounded-full mt-4 overflow-hidden">
                                <div className="h-full bg-amber-900" style={{width: `${Math.min((totalCaffeine/limit)*100, 100)}%`}}></div>
                            </div>
                        </div>

                        <div className="space-y-3">
                            {logs.map(log => (
                                <div key={log.id} className="bg-white p-4 rounded-2xl border flex justify-between items-center">
                                    <div>
                                        <div className="font-bold">{log.name}</div>
                                        <div className="text-xs text-gray-400">{log.time}</div>
                                    </div>
                                    <div className="text-xl font-bold">{log.caffeine}mg</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <button onClick={() => setShowModal(true)} className="fixed bottom-6 right-6 w-16 h-16 bg-amber-900 text-white rounded-full text-3xl shadow-lg">+</button>

                    {showModal && (
                        <div className="fixed inset-0 bg-black/50 flex items-end z-50">
                            <div className="bg-white w-full p-6 rounded-t-3xl">
                                <h2 className="text-xl font-bold mb-4">Dodaj kafu</h2>
                                <div className="grid grid-cols-2 gap-2 mb-6">
                                    {COFFEE_TYPES.map(t => (
                                        <button key={t.id} onClick={() => {setSelectedType(t); setAmount(t.standardSize)}} 
                                            className={`p-2 border rounded-xl ${selectedType.id === t.id ? 'bg-orange-50 border-orange-900' : ''}`}>
                                            {t.name}
                                        </button>
                                    ))}
                                </div>
                                <input type="range" min="10" max="400" value={amount} onChange={(e) => setAmount(e.target.value)} className="w-full mb-4" />
                                <div className="text-center mb-4 font-bold">{amount}ml ({Math.round(selectedType.caffeinePerMl * amount)}mg)</div>
                                <button onClick={addLog} className="w-full bg-amber-900 text-white py-4 rounded-2xl font-bold">Sačuvaj</button>
                                <button onClick={() => setShowModal(false)} className="w-full py-2 text-gray-400 mt-2">Zatvori</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
